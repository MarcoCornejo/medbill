# Prerequisites:
#   1. Install Ollama: https://ollama.com
#   2. ollama pull glm-ocr
#   3. docker compose up --build
#
# Ollama runs on your host machine for native performance (~12-17s/page).
# The container runs only the web app and connects to host Ollama.

services:
  medbill:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MEDBILL_MODEL=glm-ocr
      - MEDBILL_OCR_TIMEOUT=120
    extra_hosts:
      - "host.docker.internal:host-gateway"
