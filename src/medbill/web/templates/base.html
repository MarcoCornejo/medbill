<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MedBill{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: block; }
        .htmx-request .upload-form { display: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-200 px-6 py-4">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-gray-900">MedBill</a>
            <span class="text-sm text-gray-500">Your bills. Your data. Your device.</span>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
    <footer class="max-w-4xl mx-auto px-6 py-8 text-center text-sm text-gray-400">
        <p>MedBill is not legal or medical advice. Consult a professional for your specific situation.</p>
        <p class="mt-1">Documents are processed in memory and immediately purged. Nothing is stored.</p>
    </footer>
</body>
</html>
