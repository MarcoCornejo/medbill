# docker compose up --build
# First run pulls GLM-OCR (~600MB, cached in volume for subsequent runs)
# Open http://localhost:8000

services:
  medbill:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MEDBILL_MODEL=glm-ocr
      - MEDBILL_OCR_TIMEOUT=120
    volumes:
      - ollama-models:/root/.ollama
    # Uncomment below for GPU passthrough (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama-models:
